[pytest]
# tests/ is a package (relative imports in conftest + shared fixtures/oracles),
# so import via importlib with the repo root on sys.path.
pythonpath = .
testpaths = tests
# -rfEX: keep real failures/errors loud and surface xpassed (a legacy bug the
# backend just fixed); the xfailed/skipped lists are replaced by the concise
# "suite notes" summary in conftest.py. The benign Numba "low occupancy" perf
# warning is filtered in conftest.pytest_configure (guarded by an import, so the
# torch port still loads on a box without numba).
addopts = --import-mode=importlib -rfEX
filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning
